<title>Prismaera 管理画面</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
  background: linear-gradient(180deg, #0a0a1f 0%, #1a1035 100%);
  color: #e6edf3;
  min-height: 100vh;
  padding: 24px 16px 40px;
  line-height: 1.5;
}
.header {
  max-width: 1000px; margin: 0 auto 24px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; flex-wrap: wrap;
}
.header h1 {
  font-size: 20px; font-weight: 600;
  color: #fff; letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 8px;
}
.header h1 .tag {
  font-size: 10px; padding: 2px 8px;
  background: rgba(200, 125, 255, 0.25);
  border: 1px solid rgba(200, 125, 255, 0.4);
  border-radius: 6px;
  color: #d4b5ff;
  letter-spacing: 0.05em;
}
.header-actions { display: flex; gap: 8px; }
.header-btn {
  padding: 8px 14px; font-size: 13px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #fff; border-radius: 8px;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s;
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.header-btn:hover {
  background: rgba(200, 125, 255, 0.15);
  border-color: rgba(200, 125, 255, 0.4);
}

/* サマリーカード 2階層化 (重要4枚 大 + 補助4枚 小) */
.summary-main {
  max-width: 1000px; margin: 0 auto 12px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;
}
.summary-sub {
  max-width: 1000px; margin: 0 auto 24px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px;
}
.summary-card {
  background: linear-gradient(180deg, rgba(30, 24, 56, 0.85), rgba(20, 16, 40, 0.85));
  border: 1px solid rgba(200, 180, 255, 0.2);
  border-radius: 12px; padding: 16px 18px;
}
.summary-sub .summary-card {
  padding: 10px 14px;
  background: rgba(20, 16, 40, 0.5);
}
.summary-label {
  font-size: 11px; color: rgba(200, 180, 255, 0.7);
  letter-spacing: 0.08em; margin-bottom: 4px;
}
.summary-sub .summary-label { font-size: 10px; }
.summary-value {
  font-size: 26px; font-weight: 600; color: #fff;
  letter-spacing: 0.02em;
}
.summary-sub .summary-value { font-size: 18px; }
.summary-value .delta {
  font-size: 14px; color: #fcd34d;
  margin-left: 6px;
  font-weight: 500;
  cursor: help;
}

/* タブ切替 */
.admin-tabs {
  max-width: 1000px; margin: 0 auto 16px;
  display: flex; gap: 4px;
  border-bottom: 1px solid rgba(200, 180, 255, 0.2);
  padding: 0 4px;
}
.admin-tab {
  padding: 10px 20px;
  background: transparent;
  border: none;
  color: rgba(200, 180, 255, 0.6);
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.admin-tab:hover { color: rgba(200, 180, 255, 0.9); }
.admin-tab.active {
  color: #d4b5ff;
  border-bottom-color: #c87dff;
}
.admin-tab .tab-badge {
  background: linear-gradient(135deg,#ff5e9a,#c87dff);
  color: #fff;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  font-weight: 600;
}
.admin-panel { display: none; }
.admin-panel.active { display: block; }

.notice {
  max-width: 1000px; margin: 0 auto 16px;
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 14px;
  display: none;
}
.notice.error {
  display: block;
  background: rgba(255, 80, 100, 0.12);
  border: 1px solid rgba(255, 80, 100, 0.35);
  color: #ffb0bb;
}
.notice.info {
  display: block;
  background: rgba(120, 170, 255, 0.1);
  border: 1px solid rgba(120, 170, 255, 0.3);
  color: #b8d4ff;
}
.notice.loading {
  display: block;
  background: rgba(200, 180, 255, 0.08);
  border: 1px solid rgba(200, 180, 255, 0.25);
  color: rgba(255, 255, 255, 0.75);
  text-align: center;
}

.users-table {
  max-width: 1000px; margin: 0 auto;
  background: rgba(20, 16, 40, 0.6);
  border: 1px solid rgba(200, 180, 255, 0.15);
  border-radius: 14px;
  overflow: hidden;
}
.users-row {
  display: grid;
  grid-template-columns: minmax(140px, 1.8fr) 0.8fr 0.85fr 0.7fr 0.7fr 0.85fr 1.1fr 1.3fr;
  gap: 8px;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(200, 180, 255, 0.08);
  align-items: center;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
}
.users-row:hover:not(.users-head) { background: rgba(200, 125, 255, 0.06); }
.users-row:last-child { border-bottom: none; }
.users-head {
  background: rgba(0, 0, 0, 0.35);
  color: rgba(200, 180, 255, 0.8);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: default;
  position: sticky; top: 0;
}
.users-head > div {
  cursor: pointer;
  user-select: none;
  display: flex; align-items: center; gap: 4px;
}
.users-head > div:hover { color: #d4b5ff; }
.users-head > div.sort-asc::after { content: '▲'; font-size: 9px; color: #c87dff; }
.users-head > div.sort-desc::after { content: '▼'; font-size: 9px; color: #c87dff; }
.u-count.col-gasshuku { color: #fcd34d; }
.u-story {
  font-variant-numeric: tabular-nums;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
}
.u-story.dim { color: rgba(255,255,255,0.35); }
.u-story .story-done { color: #6ee7b7; font-size: 10px; margin-left: 3px; }
.u-uid-fallback {
  font-size: 11px; color: rgba(255,255,255,0.5);
  font-family: 'SF Mono', Consolas, monospace;
}

/* モバイル対応: テーブル横スクロール + サマリ縦並び */
@media (max-width: 768px) {
  .summary-main { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .summary-sub { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .summary-value { font-size: 20px; }
  .summary-sub .summary-value { font-size: 16px; }
  .users-table {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .users-row {
    grid-template-columns: 140px 70px 80px 65px 60px 80px 100px 110px;
    min-width: 805px;
  }
  .users-head { position: relative; }
  .admin-tab { padding: 8px 12px; font-size: 12px; }
}
.u-nickname {
  color: #fff; font-weight: 600; font-size: 14px;
  display: flex; align-items: center; gap: 6px;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.u-nickname.me::after {
  content: '自分';
  font-size: 10px; padding: 2px 6px;
  background: rgba(139, 92, 246, 0.25);
  border: 1px solid rgba(139, 92, 246, 0.4);
  border-radius: 4px;
  color: #d4b5ff;
}
.u-count {
  font-variant-numeric: tabular-nums;
  color: #fff;
}
.u-count.dim { color: rgba(255, 255, 255, 0.4); }
.u-lastlogin {
  color: rgba(255, 255, 255, 0.65);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}

.user-detail {
  grid-column: 1 / -1;
  margin-top: 10px; padding: 14px 16px;
  background: rgba(0, 0, 0, 0.35);
  border-radius: 10px;
  font-size: 13px;
  display: none;
}
.user-detail.active { display: block; }
.user-detail h4 {
  font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
  color: rgba(200, 180, 255, 0.7);
  margin-bottom: 8px;
}
.detail-row {
  display: flex; justify-content: space-between; gap: 12px;
  padding: 4px 0;
  color: rgba(255, 255, 255, 0.85);
}
.detail-row span:first-child { color: rgba(255, 255, 255, 0.55); }
.detail-row b { color: #fff; font-weight: 600; font-variant-numeric: tabular-nums; }
.detail-story-list { margin-top: 6px; }
.detail-story-item {
  padding: 6px 0;
  display: flex; justify-content: space-between;
  color: rgba(255, 255, 255, 0.85);
}
.detail-story-item .prog-bar {
  display: inline-block; width: 100px; height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  margin-left: 10px;
  overflow: hidden;
}
.detail-story-item .prog-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, #8b5cf6, #c084fc);
  border-radius: 3px;
  transition: width 0.3s;
}
.detail-story-complete {
  color: #3fb950;
  font-size: 11px; margin-left: 6px;
}

.login-gate {
  max-width: 420px; margin: 80px auto;
  padding: 28px 24px; text-align: center;
  background: linear-gradient(180deg, rgba(30, 24, 56, 0.98), rgba(20, 16, 40, 0.98));
  border: 1px solid rgba(200, 180, 255, 0.3);
  border-radius: 18px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  display: block;
}
.login-gate h2 { font-size: 18px; color: #fff; margin-bottom: 8px; }
.login-gate p { color: rgba(255, 255, 255, 0.7); margin-bottom: 20px; font-size: 13px; }
.login-gate input {
  width: 100%; padding: 11px 14px; font-size: 14px;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(200, 180, 255, 0.2);
  border-radius: 8px; color: #fff;
  font-family: inherit;
  margin-bottom: 8px;
}
.login-gate button {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, #8b5cf6, #c084fc);
  color: #fff; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit;
  margin-top: 8px;
}
.login-gate .gate-error {
  color: #ff6b8a; font-size: 13px;
  min-height: 18px; margin: 8px 0 0;
}

@media (max-width: 720px) {
  .users-row {
    grid-template-columns: 1.8fr 1fr 1fr;
    font-size: 12px;
    gap: 6px;
  }
  .users-row .col-lr, .users-row .col-dup, .users-row .col-lastlogin { display: none; }
  .users-head .col-ur::after { content: '/ログイン'; display: block; font-size: 9px; color: rgba(200,180,255,0.4); }
}

/* ───── 要望タブ ───── */
.section-title {
  max-width: 1000px; margin: 32px auto 12px;
  font-size: 16px; font-weight: 600; letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 10px;
  color: #fff;
}
.fb-unread-pill {
  font-size: 11px; padding: 3px 9px; border-radius: 999px;
  background: linear-gradient(90deg, #ff5faa, #ff8a5f);
  color: #fff; font-weight: 700; letter-spacing: 0.04em;
}
.feedback-section { max-width: 1000px; margin: 0 auto; }
.feedback-filter {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 12px;
}
.fb-fbtn {
  padding: 6px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.78);
  font-size: 12px; cursor: pointer; font-family: inherit;
}
.fb-fbtn:hover { background: rgba(255,255,255,0.12); color: #fff; }
.fb-fbtn.active {
  background: linear-gradient(90deg, rgba(95,255,212,0.25), rgba(200,125,255,0.25));
  border-color: rgba(95,255,212,0.5);
  color: #fff; font-weight: 700;
}
.fb-list { display: flex; flex-direction: column; gap: 10px; }
.fb-item {
  background: linear-gradient(180deg, rgba(30,24,56,0.85), rgba(20,16,40,0.85));
  border: 1px solid rgba(200,180,255,0.18);
  border-radius: 12px;
  padding: 14px 16px;
  transition: border-color 0.15s ease;
}
.fb-item.unread {
  border-left: 4px solid #ff5faa;
  border-color: rgba(255,95,170,0.45);
}
.fb-item-head {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; margin-bottom: 8px;
}
.fb-cat {
  font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 700;
  letter-spacing: 0.04em;
}
.fb-cat.bug { background: rgba(255,107,138,0.2); color: #ffb3c5; border: 1px solid rgba(255,107,138,0.4); }
.fb-cat.request { background: rgba(255,217,77,0.18); color: #ffe69e; border: 1px solid rgba(255,217,77,0.4); }
.fb-cat.praise { background: rgba(255,154,212,0.18); color: #ffc8e3; border: 1px solid rgba(255,154,212,0.4); }
.fb-cat.other { background: rgba(150,200,255,0.18); color: #b6d8ff; border: 1px solid rgba(150,200,255,0.4); }
.fb-name { font-size: 13px; color: #fff; font-weight: 600; }
.fb-time { font-size: 11px; color: rgba(255,255,255,0.5); margin-left: auto; }
.fb-toggle {
  font-size: 11px; padding: 4px 10px;
  background: rgba(95,255,212,0.18); color: #b8ffe5;
  border: 1px solid rgba(95,255,212,0.4); border-radius: 6px;

.fb-toggle.read-state { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.12); }
.fb-toggle:hover { filter: brightness(1.15); }
.fb-text {
  font-size: 14px; color: #e6edf3; line-height: 1.6;
  white-space: pre-wrap; word-break: break-word;
  padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.06);
}
.fb-meta {
  font-size: 11px; color: rgba(255,255,255,0.45);
  display: flex; flex-wrap: wrap; gap: 14px;
  margin-top: 6px;
}
.fb-meta code { font-family: monospace; }
.fb-empty {
  text-align: center; padding: 30px; color: rgba(255,255,255,0.4);
  font-size: 13px;
}
@media (max-width: 720px) {
  .fb-time { margin-left: 0; width: 100%; }
}
</style>
</head>

<div class="header">

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBFSjOheMb_epwOXCjviAA_FLQFPNiED6g",
  authDomain: "task-board-fbf1e.firebaseapp.com",
  databaseURL: "https://task-board-fbf1e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "task-board-fbf1e",
  storageBucket: "task-board-fbf1e.firebasestorage.app",
  messagingSenderId: "174442724697",
  appId: "1:174442724697:web:06ac83b275780717c06048"
};

// Prismaera と同じ名前付きappでsession共有
const app = firebase.initializeApp(FIREBASE_CONFIG, 'prism-gacha-admin');
const auth = app.auth();
const db = app.database();

// 他のタブで prism-gacha セッションを持っていればそれと共有するため、
// 同じapiKey/projectで別名appでもauth.onAuthStateChanged はこのインスタンスのみ監視
// → 自前で nickname+合言葉入力ゲートにする

let currentUid = null;
let isAdmin = false;
const $ = s => document.querySelector(s);

// Season1 定員 (キャラマスター)
const TIER_MAX = { LR: 1, UR: 7, SSR: 11, SR: 15, R: 11 };  // S1C2 (v1.2.0) 反映: UR+2, SSR+3, SR+5, R+5

function nicknameToEmail(nickname) {
  const bytes = new TextEncoder().encode(nickname);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  const b64 = btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  return 'u-' + b64 + '@prism-gacha.internal';
}

auth.onAuthStateChanged(async user => {
  if (!user) {
    $('#app').style.display = 'none';
    $('#login-gate').style.display = '';
    return;
  }
  currentUid = user.uid;
  console.log('[admin] signed in as uid:', user.uid, 'email:', user.email);
  // admin判定
  let adminVal = null;
  let adminErr = null;
  try {
    const snap = await db.ref('prism-gacha/_meta/admins/' + user.uid).once('value');
    adminVal = snap.val();
    console.log('[admin] admins/' + user.uid + ' =', adminVal);
    isAdmin = !!adminVal;
  } catch (e) {
    adminErr = e;
    console.error('[admin] admin check error:', e);
    isAdmin = false;
  }
  if (!isAdmin) {
    $('#login-gate').style.display = '';
    $('#app').style.display = 'none';
    $('#gate-error').textContent = 'このアカウントは管理者ではありません (uid=' + user.uid.slice(0, 8) + '... val=' + adminVal + (adminErr ? ' err=' + adminErr.code : '') + ')';
    try { await auth.signOut(); } catch(e){}
    return;
  }
  $('#login-gate').style.display = 'none';
  $('#app').style.display = '';
  bindSortHeaders();
  bindTabs();
  await loadAll();
});

$('#gate-btn').addEventListener('click', doGateLogin);
$('#gate-passphrase').addEventListener('keydown', e => { if (e.key === 'Enter') doGateLogin(); });

async function doGateLogin() {
  const nickname = $('#gate-nickname').value.trim();
  const pp = $('#gate-passphrase').value;
  const err = $('#gate-error');
  err.textContent = '';
  if (!nickname || !pp) { err.textContent = 'nicknameと合言葉を入力してください'; return; }
  const btn = $('#gate-btn');
  btn.disabled = true; btn.textContent = 'ログイン中…';
  try {
    await auth.signInWithEmailAndPassword(nicknameToEmail(nickname), pp);
  } catch (e) {
    err.textContent = 'nicknameまたは合言葉が違います';
    console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = 'ログイン';
  }
}

async function loadAll() {
  const notice = $('#notice');
  notice.className = 'notice loading';
  notice.textContent = '読み込み中…';
  try {
    // 合宿統計の全日データも取得 (ゲスト集計用)
    const [usersSnap, indexSnap, statsSnap] = await Promise.all([
      db.ref('prism-gacha/users').once('value'),
      db.ref('prism-gacha/_meta/userIndex').once('value'),
      db.ref('prism-gacha/gasshukuStats').once('value'),
    ]);
    const users = usersSnap.val() || {};
    const nameIndex = indexSnap.val() || {}; // nickname → uid
    const uidToNickname = {};
    for (const [nickname, uid] of Object.entries(nameIndex)) {
      if (typeof uid === 'string') uidToNickname[uid] = nickname;
    }
    // gasshukuStats から全 device を集約 (uid 持ちは ログインユーザーと結合、 uid 無しはゲストエントリ)
    const allStats = statsSnap.val() || {}; // {YYYY-MM-DD: {totalRolls, devices: {deviceId: {...}}}}
    const guestDevices = {}; // deviceId -> {totalRolls, totalSummons, firstAt, lastAt, days}
    for (const [day, dayData] of Object.entries(allStats)) {
      const dayRolls = dayData?.totalRolls || 0;
      const daySummons = dayData?.totalSummons || 0;
      const ratio = dayRolls > 0 ? daySummons / dayRolls : 1;
      const devices = dayData?.devices || {};
      for (const [devId, devData] of Object.entries(devices)) {
        if (!guestDevices[devId]) {
          guestDevices[devId] = {
            deviceId: devId,
            totalRolls: 0,
            totalSummons: 0,
            uid: null,
            firstAt: Number.POSITIVE_INFINITY,
            lastAt: 0,
            days: new Set(),
            retroactive: false,
          };
        }
        const g = guestDevices[devId];
        g.totalRolls += (devData.totalRolls || 0);
        // 召喚数: device別記録あれば優先、 なければ day比で按分推定
        const summons = (devData.totalSummons !== undefined && devData.totalSummons !== null)
          ? devData.totalSummons
          : Math.round((devData.totalRolls || 0) * ratio);
        g.totalSummons += summons;
        if (devData.uid) g.uid = devData.uid;
        if (devData.lastRollAt) g.lastAt = Math.max(g.lastAt, devData.lastRollAt);
        if (devData.retroactiveAt) {
          g.lastAt = Math.max(g.lastAt, devData.retroactiveAt);
          g.retroactive = true;
        }
        g.days.add(day);
      }
    }
    // uid別 合宿召喚数を集計 (登録ユーザー向け)
    // device別 totalSummons があれば優先、 なければ day全体の totalSummons/totalRolls 比から device.totalRolls を按分推定
    // (2026-04-27以前は device別 totalSummons 未記録、 day別比で推定救済)
    const gasshukuByUid = {};
    for (const dayData of Object.values(allStats)) {
      const dayRolls = dayData?.totalRolls || 0;
      const daySummons = dayData?.totalSummons || 0;
      const ratio = dayRolls > 0 ? daySummons / dayRolls : 1;
      for (const [devId, devData] of Object.entries(dayData?.devices || {})) {
        if (!devData.uid) continue;
        const summons = (devData.totalSummons !== undefined && devData.totalSummons !== null)
          ? devData.totalSummons
          : Math.round((devData.totalRolls || 0) * ratio);
        gasshukuByUid[devData.uid] = (gasshukuByUid[devData.uid] || 0) + summons;
      }
    }
    window._gasshukuByUid = gasshukuByUid;
    window._lastRenderArgs = [users, uidToNickname, guestDevices];
    renderUsers(users, uidToNickname, guestDevices);
    notice.className = 'notice';
    notice.textContent = '';
  } catch (e) {
    notice.className = 'notice error';
    notice.textContent = '読み込みエラー: ' + (e.message || e);
    console.error(e);
  }
}

function renderUsers(users, uidToNickname, guestDevices) {
  const entries = Object.entries(users).map(([uid, u]) => ({ uid, ...u }));
  // 最終ログイン降順
  entries.sort((a, b) => (b.lastLoginAt || 0) - (a.lastLoginAt || 0));
  // ログイン済 uid セット (gasshukuStats の uid と突合用)
  const loggedInUids = new Set(entries.map(e => e.uid));

  let sumTotal = 0, sumUR = 0, lrHolders = 0;
  const body = $('#users-body');
  body.innerHTML = '';
  // ストーリー進捗 → 表示用テキスト
  function storyProgressText(sp) {
    if (!sp || Object.keys(sp).length === 0) return { text: '未読', sortKey: 0, dim: true };
    // 最新章を出す (s1c1, s1c2, ...) — id辞書順最終
    const sids = Object.keys(sp).sort();
    const lastSid = sids[sids.length - 1];
    const v = sp[lastSid] || {};
    const idx = (v.lastSceneIndex || 0) + 1;
    const total = v.totalScenes || 0;
    const sortNum = parseInt(lastSid.replace(/[^0-9]/g,'')) * 1000 + idx;
    const label = lastSid.toUpperCase();
    if (v.completed) return { text: `${label} <span class="story-done">✓</span>`, sortKey: sortNum + 9999, dim: false };
    return { text: `${label} ${idx}/${total}`, sortKey: sortNum, dim: false };
  }
  // gasshukuStats から uid 別の合宿ガチャ回数 (キャッシュ後で参照)
  const gasshukuByUid = window._gasshukuByUid || {};
  // 一旦データを集計
  const userRowData = [];
  entries.forEach(u => {
    const s = u.state || {};
    let nickname = u.displayName || uidToNickname[u.uid];
    let nicknameDim = false;
    if (!nickname) {
      // フォールバック: uid prefix で識別可能に (元 'Unknown')
      nickname = `(unset) ${u.uid.slice(0,8)}…`;
      nicknameDim = true;
    }
    const total = s.total || 0;
    let ur = 0, lr = 0, ssrOwn = 0, srOwn = 0, rOwn = 0;
    for (const k of Object.keys(s.unlockedSet || {})) {
      if (k.startsWith('UR_')) ur++;
      else if (k.startsWith('LR_')) lr++;
      else if (k.startsWith('SSR_')) ssrOwn++;
      else if (k.startsWith('SR_')) srOwn++;
      else if (k.startsWith('R_')) rOwn++;
    }
    const dup = Object.values(s.dupCounts || {}).reduce((a, b) => a + b, 0);
    const lastAt = u.lastLoginAt ? new Date(u.lastLoginAt).toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '-';
    sumTotal += total;
    sumUR += ur;
    if (lr > 0) lrHolders++;
    const story = storyProgressText(s.storyProgress);
    const gasshukuCnt = gasshukuByUid[u.uid] || 0;

    userRowData.push({
      uid: u.uid, nickname, nicknameDim, isMe: u.uid === currentUid,
      total, ur, lr, dup, gasshukuCnt, story,
      lastAt, lastAtTs: u.lastLoginAt || 0,
      isGuest: false, _u: u, _s: s,
    });
  });

  // ===== ゲスト (gasshukuStats/devices で uid なし or 未登録) =====
  let guestCount = 0;
  if (guestDevices) {
    const guestEntries = Object.values(guestDevices).filter(g => !g.uid || !loggedInUids.has(g.uid));
    guestEntries.forEach(g => {
      guestCount++;
      const lastAt = g.lastAt ? new Date(g.lastAt).toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '-';
      const idShort = g.deviceId.slice(-6);
      userRowData.push({
        isGuest: true, deviceId: g.deviceId, idShort, retroactive: g.retroactive,
        nickname: `🎌 ゲスト #${idShort}`, nicknameDim: true,
        total: 0, ur: 0, lr: 0, dup: 0,
        gasshukuCnt: g.totalSummons || 0,
        story: { text: '—', sortKey: -1, dim: true },
        lastAt, lastAtTs: g.lastAt || 0,
        days: g.days,
      });
    });
  }

  // ===== ソート =====
  const sortKey = window._adminSortKey || 'lastlogin';
  const sortDir = window._adminSortDir || 'desc';
  const cmp = (a, b) => {
    let av, bv;
    switch (sortKey) {
      case 'nickname': av = a.nickname.toLowerCase(); bv = b.nickname.toLowerCase(); break;
      case 'total': av = a.total; bv = b.total; break;
      case 'ur': av = a.ur; bv = b.ur; break;
      case 'lr': av = a.lr; bv = b.lr; break;
      case 'dup': av = a.dup; bv = b.dup; break;
      case 'gasshuku': av = a.gasshukuCnt; bv = b.gasshukuCnt; break;
      case 'story': av = a.story.sortKey; bv = b.story.sortKey; break;
      case 'lastlogin': default: av = a.lastAtTs; bv = b.lastAtTs; break;
    }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  };
  userRowData.sort(cmp);

  // ===== 描画 =====
  userRowData.forEach(d => {
    const row = document.createElement('div');
    row.className = 'users-row' + (d.isGuest ? ' guest-row' : '');
    if (d.isGuest) row.style.opacity = '0.78';
    if (d.isGuest) {
      const tag = d.retroactive ? ' <span style="font-size:10px;color:#fcd34d">過去</span>' : '';
      row.innerHTML = `
        <div class="u-nickname dim">${d.nickname}${tag}</div>
        <div class="u-count dim">—</div>
        <div class="u-count col-ur dim">—</div>
        <div class="u-count col-lr dim">—</div>
        <div class="u-count col-dup dim">—</div>
        <div class="u-count col-gasshuku ${d.gasshukuCnt === 0 ? 'dim' : ''}">${d.gasshukuCnt}</div>
        <div class="u-story dim">—</div>
        <div class="u-lastlogin col-lastlogin">${d.lastAt}</div>
      `;
      const detail = document.createElement('div');
      detail.className = 'user-detail';
      detail.innerHTML = `
        <div style="padding:14px 18px;color:#c0c4d0;font-size:13px">
          <div><b>device_id</b>: <code style="font-size:11px">${d.deviceId}</code></div>
          <div><b>合宿ガチャ召喚数</b>: ${d.gasshukuCnt}</div>
          <div><b>プレイ日数</b>: ${d.days ? d.days.size : 0}日 (${d.days ? [...d.days].sort().join(', ') : ''})</div>
          <div><b>最終操作</b>: ${d.lastAt}</div>
          ${d.retroactive ? '<div style="color:#fcd34d;margin-top:6px">※ 過去ゲスト遡及アップロード</div>' : ''}
          <div style="margin-top:8px;color:rgba(255,255,255,0.5);font-size:11px">アカウント未登録のためキャラ獲得情報は端末ローカルのみで保持されています</div>
        </div>
      `;
      row.appendChild(detail);
      row.addEventListener('click', () => detail.classList.toggle('active'));
    } else {
      row.innerHTML = `
        <div class="u-nickname ${d.isMe ? 'me' : ''} ${d.nicknameDim ? 'u-uid-fallback' : ''}">${escapeHtml(d.nickname)}</div>
        <div class="u-count ${d.total === 0 ? 'dim' : ''}">${d.total}</div>
        <div class="u-count col-ur ${d.ur === 0 ? 'dim' : ''}">${d.ur}/${TIER_MAX.UR}</div>
        <div class="u-count col-lr ${d.lr === 0 ? 'dim' : ''}">${d.lr}/${TIER_MAX.LR}</div>
        <div class="u-count col-dup ${d.dup === 0 ? 'dim' : ''}">${d.dup}</div>
        <div class="u-count col-gasshuku ${d.gasshukuCnt === 0 ? 'dim' : ''}">${d.gasshukuCnt}</div>
        <div class="u-story ${d.story.dim ? 'dim' : ''}">${d.story.text}</div>
        <div class="u-lastlogin col-lastlogin">${d.lastAt}</div>
      `;
      const detail = buildDetail(d._u, d._s);
      row.appendChild(detail);
      row.addEventListener('click', () => detail.classList.toggle('active'));
    }
    body.appendChild(row);
  });

  // ヘッダにソート矢印 (現在のsortKey)
  document.querySelectorAll('.users-head > div').forEach(h => {
    h.classList.remove('sort-asc','sort-desc');
    if (h.dataset.sort === sortKey) h.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
  });

  const userCount = entries.length;
  const tooltipDelta = `合宿ガチャ実行端末: ${guestCount}台 (アカウント未登録)`;
  $('#sum-users').innerHTML = guestCount > 0 ? `${userCount} <span class="delta" title="${tooltipDelta}">+${guestCount}🎌</span>` : userCount;
  $('#sum-total').textContent = sumTotal;
  $('#sum-ur').textContent = userCount ? `${sumUR}/${userCount * TIER_MAX.UR}` : '-';
  $('#sum-lr-holders').textContent = userCount ? `${lrHolders}/${userCount}` : '-';
  // 合宿ガチャ統計 (今日)
  loadGasshukuStats();
}

// ヘッダクリックでソート (DOMContentLoaded後にbind)
function bindSortHeaders() {
  document.querySelectorAll('.users-head > div[data-sort]').forEach(h => {
    h.addEventListener('click', () => {
      const key = h.dataset.sort;
      if (window._adminSortKey === key) {
        window._adminSortDir = window._adminSortDir === 'asc' ? 'desc' : 'asc';
      } else {
        window._adminSortKey = key;
        window._adminSortDir = (key === 'nickname') ? 'asc' : 'desc';
      }
      // 再描画
      if (window._lastRenderArgs) {
        renderUsers(...window._lastRenderArgs);
      }
    });
  });
}

// タブ切替
function bindTabs() {
  document.querySelectorAll('.admin-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.panel;
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.toggle('active', t === tab));
      document.querySelectorAll('.admin-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + target));
    });
  });
}

async function loadGasshukuStats() {
  try {
    // 全日 totalRolls/totalSummons + 全期間 devices 集計
    const snap = await db.ref('prism-gacha/gasshukuStats').once('value');
    const all = snap.val() || {};
    let totalRolls = 0, totalSummons = 0;
    const allDevices = new Set();
    for (const day in all) {
      const dayData = all[day] || {};
      totalRolls += (dayData.totalRolls || 0);
      totalSummons += (dayData.totalSummons || 0);
      const devices = dayData.devices || {};
      Object.keys(devices).forEach(devId => allDevices.add(devId));
    }
    $('#sum-gasshuku-rolls').textContent = totalRolls;
    $('#sum-gasshuku-summons').textContent = totalSummons;
    $('#sum-gasshuku-devices').textContent = allDevices.size;
  } catch (e) {
    console.error('[admin] gasshuku stats failed:', e);
    $('#sum-gasshuku-rolls').textContent = '⚠';
    $('#sum-gasshuku-summons').textContent = '⚠';
    $('#sum-gasshuku-devices').textContent = '⚠';
    // エラー詳細を画面下部に表示 (Firebase Rulesの問題切り分け用)
    let errBox = document.getElementById('gasshuku-err-detail');
    if (!errBox) {
      errBox = document.createElement('div');
      errBox.id = 'gasshuku-err-detail';
      errBox.style.cssText = 'max-width:1000px;margin:12px auto;padding:14px 18px;background:rgba(255,80,100,0.12);border:1px solid rgba(255,80,100,0.35);border-radius:10px;color:#ffb0bb;font-size:13px;';
      const summary = document.querySelector('.summary');
      if (summary) summary.parentNode.insertBefore(errBox, summary.nextSibling);
    }
    errBox.innerHTML = '<b>🎌 合宿統計の取得失敗</b><br>' + (e.message || e) + '<br><small>Firebase Rules で gasshukuStats.read が admin判定 (auth.uid が _meta/admins に登録) を要求しています。 console (F12) でも詳細確認可能。</small>';
  }
}

function buildDetail(u, s) {
  const detail = document.createElement('div');
  detail.className = 'user-detail';
  const createdAt = u.createdAt ? new Date(u.createdAt).toLocaleString('ja-JP') : '-';
  const lastAt = u.lastLoginAt ? new Date(u.lastLoginAt).toLocaleString('ja-JP') : '-';
  const updatedAt = s.updatedAt ? new Date(s.updatedAt).toLocaleString('ja-JP') : '-';
  let lrNames = [], urNames = [], ssrCount = 0, srCount = 0, rCount = 0;
  for (const k of Object.keys(s.unlockedSet || {})) {
    if (k.startsWith('LR_')) lrNames.push(k.replace('LR_', ''));
    else if (k.startsWith('UR_')) urNames.push(k.replace('UR_', ''));
    else if (k.startsWith('SSR_')) ssrCount++;
    else if (k.startsWith('SR_')) srCount++;
    else if (k.startsWith('R_')) rCount++;
  }
  const totalOwn = lrNames.length + urNames.length + ssrCount + srCount + rCount;
  const totalMax = TIER_MAX.LR + TIER_MAX.UR + TIER_MAX.SSR + TIER_MAX.SR + TIER_MAX.R;

  let storyHtml = '';
  const sp = s.storyProgress || {};
  if (Object.keys(sp).length === 0) {
    storyHtml = '<div style="color:rgba(255,255,255,0.4);padding:6px 0;">まだストーリー未読</div>';
  } else {
    for (const [sid, v] of Object.entries(sp)) {
      const idx = v.lastSceneIndex || 0;
      const total = v.totalScenes || 0;
      const pct = total ? Math.round((idx + 1) / total * 100) : 0;
      const completeBadge = v.completed ? '<span class="detail-story-complete">✓ 読了</span>' : '';
      const lastRead = v.lastReadAt ? new Date(v.lastReadAt).toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '-';
      storyHtml += `<div class="detail-story-item"><span>${sid}: ${idx + 1}/${total}<span class="prog-bar"><span class="prog-bar-inner" style="width:${pct}%"></span></span>${completeBadge}</span><span style="color:rgba(255,255,255,0.5);font-size:11px">${lastRead}</span></div>`;
    }
  }

  detail.innerHTML = `
    <h4>詳細</h4>
    <div class="detail-row"><span>uid</span><b style="font-size:11px;font-family:monospace">${u.uid}</b></div>
    <div class="detail-row"><span>登録日</span><b>${createdAt}</b></div>
    <div class="detail-row"><span>最終ログイン</span><b>${lastAt}</b></div>
    <div class="detail-row"><span>最終state同期</span><b>${updatedAt}</b></div>
    <div class="detail-row"><span>天井カウント</span><b>${s.pity || 0} / 180</b></div>
    <div class="detail-row"><span>所持キャラ総数</span><b>${totalOwn}/${totalMax}</b></div>
    <div class="detail-row"><span>LR (${lrNames.length}/${TIER_MAX.LR})</span><b>${lrNames.length ? lrNames.join(', ') : '-'}</b></div>
    <div class="detail-row"><span>UR (${urNames.length}/${TIER_MAX.UR})</span><b>${urNames.length ? urNames.join(', ') : '-'}</b></div>
    <div class="detail-row"><span>SSR</span><b>${ssrCount}/${TIER_MAX.SSR}</b></div>
    <div class="detail-row"><span>SR</span><b>${srCount}/${TIER_MAX.SR}</b></div>
    <div class="detail-row"><span>R</span><b>${rCount}/${TIER_MAX.R}</b></div>
    <h4 style="margin-top:12px">ストーリー進捗</h4>
    <div class="detail-story-list">${storyHtml}</div>
  `;
  return detail;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

$('#refresh-btn').addEventListener('click', () => { if (isAdmin) loadAll(); });

// ────────── 要望タブ ──────────
let feedbackItems = [];
let fbFilter = 'all';
const FB_CAT_LABEL = { bug: '🐛 バグ', request: '✨ 要望', praise: '💖 感想', other: '💬 その他' };

async function loadFeedback() {
  try {
    const snap = await db.ref('prism-gacha/feedback').once('value');
    const items = [];
    snap.forEach(child => { items.push({ id: child.key, ...(child.val() || {}) }); });
    items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    feedbackItems = items;
    // 未読カウンタを実数で再同期 (累計ズレ防止のため refresh 時に true-up)
    const actualUnread = items.filter(f => !f.read).length;
    try {
      await db.ref('prism-gacha/_meta/feedback_unread_count').set(actualUnread);
    } catch (e) { console.warn('[feedback] counter resync failed:', e); }
    renderFeedback();
  } catch (e) {
    console.error('[feedback] load failed:', e);
    document.getElementById('fb-list').innerHTML = '<div class="fb-empty">読み込みエラー: ' + escapeHtml(e.message || String(e)) + '</div>';
  }
}

function renderFeedback() {
  const list = document.getElementById('fb-list');
  // カウント集計
  const cnt = { all: feedbackItems.length, unread: 0, bug: 0, request: 0, praise: 0, other: 0 };
  feedbackItems.forEach(f => {
    if (!f.read) cnt.unread++;
    if (cnt[f.category] != null) cnt[f.category]++;
  });
  for (const k of Object.keys(cnt)) {
    const el = document.getElementById('fb-cnt-' + k);
    if (el) el.textContent = cnt[k];
  }
  // サマリー連動
  const sumEl = document.getElementById('sum-feedback-unread');
  if (sumEl) sumEl.textContent = cnt.unread;
  // 未読 pill
  const pill = document.getElementById('fb-unread-pill');
  if (pill) {
    if (cnt.unread > 0) { pill.style.display = ''; pill.textContent = cnt.unread + ' 未読'; }
    else pill.style.display = 'none';
  }
  // タブバッジ連動
  const tabBadge = document.getElementById('tab-fb-badge');
  if (tabBadge) {
    if (cnt.unread > 0) { tabBadge.style.display = ''; tabBadge.textContent = cnt.unread; }
    else tabBadge.style.display = 'none';
  }
  // フィルタ
  let filtered = feedbackItems;
  if (fbFilter === 'unread') filtered = feedbackItems.filter(f => !f.read);
  else if (fbFilter !== 'all') filtered = feedbackItems.filter(f => f.category === fbFilter);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="fb-empty">該当する要望はありません</div>';
    return;
  }
  list.innerHTML = filtered.map(f => {
    const date = f.createdAt ? new Date(f.createdAt).toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '-';
    const catLbl = FB_CAT_LABEL[f.category] || f.category || '?';
    const name = f.name ? escapeHtml(f.name) : '<span style="color:rgba(255,255,255,0.4)">(名前なし)</span>';
    const isDev = f.origin && f.origin.indexOf('dev.') !== -1;
    const originLbl = isDev ? '<span style="color:#fbbf24">[dev]</span>' : '';
    const uidShort = (f.uid || '').slice(0, 8) + '…';
    return `
      <div class="fb-item ${f.read ? 'read' : 'unread'}" data-id="${f.id}">
        <div class="fb-item-head">
          <span class="fb-cat ${f.category}">${catLbl}</span>
          <span class="fb-name">${name}</span>
          <span class="fb-time">${date} ${originLbl}</span>
          <button class="fb-toggle ${f.read ? 'read-state' : ''}" onclick="toggleFeedbackRead('${f.id}', ${f.read ? 'true' : 'false'})">${f.read ? '未読に戻す' : '既読にする'}</button>
        </div>
        <div class="fb-text">${escapeHtml(f.text || '')}</div>
        <div class="fb-meta">
          <span>uid: <code>${escapeHtml(uidShort)}</code></span>
          ${f.origin ? '<span>origin: <code>' + escapeHtml(f.origin) + '</code></span>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

async function toggleFeedbackRead(id, currentRead) {
  try {
    const newRead = !currentRead;
    await db.ref('prism-gacha/feedback/' + id + '/read').set(newRead);
    // 未読カウンタ調整 (read:true→false で +1、 false→true で -1)
    const delta = newRead ? -1 : 1;
    try {
      await db.ref('prism-gacha/_meta/feedback_unread_count').transaction(c => Math.max(0, (c || 0) + delta));
    } catch (e) { console.warn('[feedback] counter adjust failed:', e); }
    // ローカル更新+再描画 (再fetchより速い)
    const item = feedbackItems.find(f => f.id === id);
    if (item) item.read = newRead;
    renderFeedback();
  } catch (e) {
    console.error('[feedback] toggle read failed:', e);
    alert('既読切替失敗: ' + (e.message || e));
  }
}

document.querySelectorAll('.fb-fbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fb-fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fbFilter = btn.dataset.filter;
    renderFeedback();
  });
});

// loadAll に統合 (refresh時に一緒にfetch)
const _origLoadAll = loadAll;
loadAll = async function() {
  await _origLoadAll();
  await loadFeedback();
};

// ===== BGM継続再生 (index.htmlで再生中の曲を引き継ぐ) =====
(function bgmCarryOver() {
  const enabled = localStorage.getItem('prism-bgm-enabled') === '1';
  const muted = localStorage.getItem('prism-master-mute') === 'on';
  if (!enabled || muted) return;

  const BGM_LIST = [
    { id: 'dawn',  file: '/assets/bgm/home.mp3',                       label: 'メインテーマ' },
    { id: 'watch', file: '/assets/bgm/prism-watch.mp3',                label: '第1章テーマ' },
    { id: 'tide',  file: '/assets/bgm/prism-tide.mp3',                 label: '第2章テーマ' },
    { id: 'rift',  file: '/assets/bgm/Prismatic Rift Overture.mp3',    label: '虹裂の序曲' },
  ];
  const currentId = localStorage.getItem('prism-bgm-current') || 'dawn';
  const lastId = localStorage.getItem('prism-bgm-last-id');
  const lastTime = parseFloat(localStorage.getItem('prism-bgm-last-time') || '0');
  const volume = parseFloat(localStorage.getItem('prism-bgm-volume') || '0.4');

  const track = BGM_LIST.find(b => b.id === currentId) || BGM_LIST[0];
  const audio = document.createElement('audio');
  audio.id = 'bgm-admin'; audio.preload = 'auto'; audio.loop = true;
  audio.src = track.file; audio.volume = Math.max(0, Math.min(1, volume));
  document.body.appendChild(audio);

  if (lastId === track.id && lastTime > 0.5) {
    audio.addEventListener('loadedmetadata', () => {
      try { if (lastTime < (audio.duration || Infinity) - 1) audio.currentTime = lastTime; } catch(e) {}
    }, { once: true });
  }

  // 状態保存 (admin→index 戻り時の復帰用)
  setInterval(() => {
    try {
      localStorage.setItem('prism-bgm-last-id', track.id);
      localStorage.setItem('prism-bgm-last-time', String(audio.currentTime));
    } catch(e) {}
  }, 1000);

  // Media Session API (PWAホーム追加版でロック画面に表示)
  if ('mediaSession' in navigator) {
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: `Prismaera -${track.label}- (Admin)`,
        artist: 'Prismaera', album: '虹霊界の物語',
        artwork: [
          { src: '/images/icons/icon-180.png', sizes: '180x180', type: 'image/png' },
          { src: '/images/icons/icon-192.png', sizes: '192x192', type: 'image/png' },
          { src: '/images/icons/icon-512.png', sizes: '512x512', type: 'image/png' },
        ],
      });
      navigator.mediaSession.setActionHandler('play',  () => audio.play().catch(()=>{}));
      navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    } catch(e) {}
  }

  // 自動再生試行 (直近にprismaeraで操作してた文脈なら成功率高い)
  const tryPlay = () => audio.play().catch(()=>{});
  tryPlay();
  // フォールバック: 1クリック/キー操作で再生
  document.addEventListener('click', tryPlay, { once: true });
  document.addEventListener('keydown', tryPlay, { once: true });
})();

</script>
